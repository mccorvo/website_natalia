name: Daily Article Publisher

on:
  schedule:
    # GitHub schedules are UTC. The publisher accepts the 08:00-10:00
    # Europe/Dublin hours so delayed scheduled runs can still publish once.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-article-publisher-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect Cloudflare deploy secrets
        id: deploy_secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node - <<'NODE'
          const { appendFileSync } = require("node:fs");
          const required = ["CLOUDFLARE_API_TOKEN", "CLOUDFLARE_ACCOUNT_ID"];
          const missing = required.filter((name) => !process.env[name]);
          if (missing.length > 0) {
            console.log(`::warning::Missing Cloudflare deploy secret(s): ${missing.join(", ")}. The daily article will still be committed; Cloudflare deploy and live verification will be skipped.`);
            appendFileSync(process.env.GITHUB_OUTPUT, "cloudflare_available=false\n");
          } else {
            console.log("Cloudflare deploy secrets are configured.");
            appendFileSync(process.env.GITHUB_OUTPUT, "cloudflare_available=true\n");
          }
          NODE

      - name: Start from latest origin/main
        run: |
          git fetch origin main --prune
          git checkout -B codex/daily-article-publisher-run origin/main

      - name: Publish next queued article
        id: publish
        run: node tools/publish_next_article.mjs --publish

      - name: Stop if there is nothing to publish
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No article was published by this run."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify publisher diff scope
        if: steps.diff.outputs.has_changes == 'true'
        env:
          PUBLISHED_SLUG: ${{ steps.publish.outputs.published_slug }}
        run: |
          node - <<'NODE'
          const { execFileSync } = require("node:child_process");
          const slug = process.env.PUBLISHED_SLUG;
          if (!slug) {
            console.error("PUBLISHED_SLUG is missing.");
            process.exit(1);
          }
          const tracked = execFileSync("git", ["diff", "--name-only"], { encoding: "utf8" })
            .trim()
            .split("\n")
            .filter(Boolean);
          const untracked = execFileSync("git", ["ls-files", "--others", "--exclude-standard"], { encoding: "utf8" })
            .trim()
            .split("\n")
            .filter(Boolean);
          const changed = [...new Set([...tracked, ...untracked])];
          const allowed = new Set([
            `articles/${slug}.html`,
            ...changed.filter((file) => file.startsWith(`assets/images/blog/${slug}-cover.`)),
            "blog.html",
            "sitemap.xml",
            "data/article-publishing/state.json",
          ]);
          const unexpected = changed.filter((file) => !allowed.has(file));
          if (unexpected.length > 0) {
            console.error(`Unexpected files changed:\n${unexpected.join("\n")}`);
            process.exit(1);
          }
          for (const file of allowed) {
            if (!changed.includes(file)) {
              console.error(`Expected changed file is missing from diff: ${file}`);
              process.exit(1);
            }
          }
          const coverFiles = changed.filter((file) => file.startsWith(`assets/images/blog/${slug}-cover.`));
          if (coverFiles.length !== 1) {
            console.error(`Expected exactly one SEO-named cover image for ${slug}; found ${coverFiles.length}.`);
            process.exit(1);
          }
          console.log(`Publisher diff is limited to ${changed.join(", ")}.`);
          NODE

      - name: Run typecheck
        if: steps.diff.outputs.has_changes == 'true'
        run: npm run typecheck

      - name: Run lint
        if: steps.diff.outputs.has_changes == 'true'
        run: npm run lint

      - name: Run build
        if: steps.diff.outputs.has_changes == 'true'
        run: npm run build

      - name: Commit one-article publish
        if: steps.diff.outputs.has_changes == 'true'
        env:
          PUBLISHED_SLUG: ${{ steps.publish.outputs.published_slug }}
        run: |
          git add "articles/${PUBLISHED_SLUG}.html" "assets/images/blog/${PUBLISHED_SLUG}-cover."* blog.html sitemap.xml data/article-publishing/state.json
          git commit -m "Publish article: ${PUBLISHED_SLUG}"

      - name: Run prepublish check
        if: steps.diff.outputs.has_changes == 'true'
        run: npm run prepublish-check

      - name: Push to main
        if: steps.diff.outputs.has_changes == 'true'
        run: git push origin HEAD:main

      - name: Deploy to Cloudflare
        if: steps.diff.outputs.has_changes == 'true' && steps.deploy_secrets.outputs.cloudflare_available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy

      - name: Verify live article and blog
        if: steps.diff.outputs.has_changes == 'true' && steps.deploy_secrets.outputs.cloudflare_available == 'true'
        env:
          PUBLISHED_SLUG: ${{ steps.publish.outputs.published_slug }}
          ARTICLE_URL: ${{ steps.publish.outputs.article_url }}
        run: |
          node - <<'NODE'
          const slug = process.env.PUBLISHED_SLUG;
          const articleUrl = process.env.ARTICLE_URL;
          const blogUrl = "https://nataliacorvo.com/blog.html";
          const italianMarker = /(?:lang=["']it["']|data-set-lang=["']it["']|lang-it|\/it(?:\/|["'#?])|Italiano|italiano)/u;

          async function getText(url) {
            try {
              const response = await fetch(url, { redirect: "follow" });
              if (!response.ok) return "";
              return await response.text();
            } catch {
              return "";
            }
          }

          for (let attempt = 1; attempt <= 30; attempt += 1) {
            const [articleHtml, blogHtml] = await Promise.all([getText(articleUrl), getText(blogUrl)]);
            const articleReady =
              articleHtml.includes(`https://nataliacorvo.com/articles/${slug}`) &&
              /Nota bezpieczeństwa|Safety note/u.test(articleHtml) &&
              articleHtml.includes("source-box") &&
              articleHtml.includes(`assets/images/blog/${slug}-cover.`) &&
              articleHtml.includes("Wikimedia Commons");
            const blogReady = blogHtml.includes(`articles/${slug}`);
            const noItalian = !italianMarker.test(`${articleHtml}\n${blogHtml}`);

            if (articleReady && blogReady && noItalian) {
              console.log(`Live verification passed for ${articleUrl} and ${blogUrl}.`);
              process.exit(0);
            }
            console.log(`Live verification not ready yet, attempt ${attempt}/30.`);
            await new Promise((resolve) => setTimeout(resolve, 20000));
          }
          console.error(`Live verification failed for ${articleUrl} or ${blogUrl}.`);
          process.exit(1);
          NODE
